<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecurePass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --border:     #1e1e2e;
      --accent:     #00ff88;
      --accent-dim: #00ff8822;
      --danger:     #ff4466;
      --text:       #e0e0f0;
      --muted:      #555570;
      --mono:       'Share Tech Mono', monospace;
      --sans:       'Syne', sans-serif;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      padding: 24px 20px 20px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 18px; height: 18px; }

    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .title span { color: var(--accent); }

    .badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0.7;
    }

    /* ── Password Display ── */
    .pw-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .pw-box.success { border-color: var(--accent); }
    .pw-box.error   { border-color: var(--danger); }

    .pw-label {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .pw-value {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 1px;
      word-break: break-all;
      line-height: 1.5;
      min-height: 22px;
    }

    .pw-value.placeholder {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }

    /* ── Hash Display ── */
    .hash-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .hash-label {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .hash-value {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.6;
    }

    .hash-value.active { color: #4488ff; }

    /* ── Status ── */
    .status {
      font-family: var(--mono);
      font-size: 10px;
      min-height: 16px;
      margin-bottom: 16px;
      padding-left: 2px;
      transition: color 0.3s;
    }

    .status.success { color: var(--accent); }
    .status.error   { color: var(--danger); }
    .status.loading { color: var(--muted); }

    /* ── Button ── */
    .btn-generate {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-generate:hover   { opacity: 0.88; }
    .btn-generate:active  { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #00000033;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-generate.loading .spinner    { display: block; }
    .btn-generate.loading .btn-label  { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entropy-badge {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
    }

    .entropy-badge span { color: var(--accent); opacity: 0.8; }

    .db-badge {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
    }

    .db-badge span { color: #4488ff; opacity: 0.8; }

    /* scan line overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="title">Secure<span>Pass</span></div>
    <div class="badge">v1.0</div>
  </div>

  <div class="pw-box" id="pwBox">
    <div class="pw-label">Generated Password</div>
    <div class="pw-value placeholder" id="pwValue">Press generate to begin...</div>
  </div>

  <div class="hash-box">
    <div class="hash-label">SHA-256 Hash</div>
    <div class="hash-value" id="hashValue">—</div>
  </div>

  <div class="status" id="status"></div>

  <button class="btn-generate" id="btnGenerate">
    <div class="spinner"></div>
    <span class="btn-label">⚡ Generate Password</span>
  </button>

  <div class="footer">
    <div class="entropy-badge">entropy: <span>os.urandom</span></div>
    <div class="db-badge">db: <span>supabase</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
